<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e293b">
    <meta name="description" content="Uren Tracker CAO Kleinmetaal">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Uren">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%231e293b' width='180' height='180'/><text x='90' y='125' font-size='100' fill='%2360a5fa' text-anchor='middle' font-family='Arial'>🕐</text></svg>">
    <title>🕐 Uren Tracker</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            margin-bottom: 1rem;
            padding-top: 0.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        input[type="date"] {
            cursor: pointer;
        }

        .period-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .period-btn {
            padding: 0.75rem;
            background: #334155;
            color: white;
            border: 2px solid #475569;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }

        .period-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .date-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .date-range input {
            margin-bottom: 0;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        button:hover:not(:disabled) {
            background: #2563eb;
        }

        button:disabled {
            background: #475569;
            opacity: 0.5;
        }

        .cao-info {
            background: rgba(51, 65, 85, 0.3);
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 1rem;
            font-size: 0.75rem;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .stat-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #60a5fa;
        }

        .day-entry {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .day-date {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #60a5fa;
        }

        .day-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .day-inputs input {
            margin-bottom: 0;
        }

        .day-inputs label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }

        .input-label-small {
            display: block;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }

        .delete-day {
            width: 100%;
            background: #ef4444;
            padding: 0.5rem;
            font-size: 0.875rem;
        }

        .delete-day:hover {
            background: #dc2626;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .breakdown {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .breakdown-label {
            color: #94a3b8;
        }

        .breakdown-value {
            color: #60a5fa;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕐 Uren Tracker</h1>
            <p>Werkuren + verlof bijhouden</p>
        </div>

        <!-- Periode selector -->
        <div class="card">
            <h2>📅 Periode</h2>
            <div class="period-selector">
                <button class="period-btn active" onclick="setPeriodType('month')">Deze maand</button>
                <button class="period-btn" onclick="setPeriodType('custom')">Custom periode</button>
            </div>

            <div id="customDateRange" style="display: none;">
                <div class="date-range">
                    <div class="input-group">
                        <label for="startDate">Van</label>
                        <input type="date" id="startDate" onchange="updateEntries()">
                    </div>
                    <div class="input-group">
                        <label for="endDate">Tot</label>
                        <input type="date" id="endDate" onchange="updateEntries()">
                    </div>
                </div>
            </div>
        </div>

        <!-- CAO Info -->
        <div class="cao-info">
            📋 <strong>CAO KLEINMETAAL:</strong><br>
            🔹 Ma-Vrij: 1e+2e overuur = 128,44%<br>
            🔹 Ma-Vrij: 3e+ overuur = 146,56%<br>
            🔹 Zaterdag: 146,56% | 🔹 Zondag: 184,43%
        </div>

        <!-- Stats -->
        <div class="card">
            <h2>📊 Totaal periode</h2>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Normaal</div>
                    <div class="stat-value" id="totalNormal">0h</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Verlof</div>
                    <div class="stat-value" id="totalVerlof">0h</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Overuren</div>
                    <div class="stat-value" id="totalOvertime">0h</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Totaal</div>
                    <div class="stat-value" id="totalAll">0h</div>
                </div>
            </div>

            <div id="overtimeBreakdown" style="margin-top: 1rem;"></div>
        </div>

        <!-- Days entry -->
        <div class="card">
            <h2>📝 Invoer per dag</h2>
            <button onclick="addDayEntry()">+ Dag toevoegen</button>
            <div id="daysContainer" style="margin-top: 1rem;"></div>
        </div>
    </div>

    <script>
        let entries = {}; // { date: { hours, verlof, project } }
        let periodType = 'month';
        let customStart = null;
        let customEnd = null;

        function loadEntries() {
            const stored = localStorage.getItem('uren_entries_v2');
            entries = stored ? JSON.parse(stored) : {};
            initializePeriod();
            renderEntries();
        }

        function saveEntries() {
            localStorage.setItem('uren_entries_v2', JSON.stringify(entries));
        }

        function initializePeriod() {
            const today = new Date();
            if (periodType === 'month') {
                customStart = new Date(today.getFullYear(), today.getMonth(), 1);
                customEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            }
        }

        function setPeriodType(type) {
            periodType = type;
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const customRange = document.getElementById('customDateRange');
            if (type === 'custom') {
                customRange.style.display = 'block';
                const today = new Date();
                document.getElementById('startDate').value = today.toISOString().split('T')[0];
                document.getElementById('endDate').value = today.toISOString().split('T')[0];
            } else {
                customRange.style.display = 'none';
                initializePeriod();
            }
            renderEntries();
        }

        function updateEntries() {
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;
            if (startVal && endVal) {
                customStart = new Date(startVal + 'T00:00:00');
                customEnd = new Date(endVal + 'T00:00:00');
            }
            renderEntries();
        }

        function getPeriodDates() {
            const start = new Date(customStart);
            const end = new Date(customEnd);
            const dates = [];
            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                dates.push(d.toISOString().split('T')[0]);
            }
            return dates;
        }

        function addDayEntry() {
            const today = new Date().toISOString().split('T')[0];
            if (!entries[today]) {
                entries[today] = { hours: 0, verlof: 0, project: '' };
            }
            saveEntries();
            renderEntries();
        }

        function deleteDay(date) {
            delete entries[date];
            saveEntries();
            renderEntries();
        }

        function updateDay(date, field, value) {
            if (!entries[date]) entries[date] = { hours: 0, verlof: 0, project: '' };
            entries[date][field] = field === 'project' ? value : parseFloat(value) || 0;
            saveEntries();
            renderEntries();
        }

        function calculateOvertimeForDay(date, workHours) {
            const dayOfWeek = new Date(date + 'T00:00:00').getDay();
            
            if (dayOfWeek === 0) return { normal: 0, ot128: 0, ot146: 0, ot184: workHours };
            if (dayOfWeek === 6) return { normal: 0, ot128: 0, ot146: workHours, ot184: 0 };
            
            if (workHours <= 8) return { normal: workHours, ot128: 0, ot146: 0, ot184: 0 };
            if (workHours <= 10) return { normal: 8, ot128: (workHours - 8), ot146: 0, ot184: 0 };
            return { normal: 8, ot128: 2, ot146: (workHours - 10), ot184: 0 };
        }

        function renderEntries() {
            const container = document.getElementById('daysContainer');
            const dates = getPeriodDates();
            
            container.innerHTML = dates.map(date => {
                const entry = entries[date] || { hours: 0, verlof: 0, project: '' };
                const dayName = new Date(date + 'T00:00:00').toLocaleDateString('nl-NL', { weekday: 'short' });
                
                return `
                    <div class="day-entry">
                        <div class="day-date">${dayName}, ${date}</div>
                        <div class="day-inputs">
                            <div>
                                <span class="input-label-small">Werkuren</span>
                                <input type="number" value="${entry.hours}" min="0" max="24" step="0.5" 
                                    onchange="updateDay('${date}', 'hours', this.value)">
                            </div>
                            <div>
                                <span class="input-label-small">Verlof (uur)</span>
                                <input type="number" value="${entry.verlof}" min="0" max="8" step="0.5"
                                    onchange="updateDay('${date}', 'verlof', this.value)">
                            </div>
                        </div>
                        <div class="input-group">
                            <span class="input-label-small">Project/Omschrijving</span>
                            <input type="text" value="${entry.project}" placeholder="CNC werk, assembly, etc."
                                onchange="updateDay('${date}', 'project', this.value)">
                        </div>
                        <button class="delete-day" onclick="deleteDay('${date}')">🗑️ Verwijderen</button>
                    </div>
                `;
            }).join('');

            calculateStats();
        }

        function calculateStats() {
            const dates = getPeriodDates();
            let totalNormal = 0, totalVerlof = 0, totalOt128 = 0, totalOt146 = 0, totalOt184 = 0;

            dates.forEach(date => {
                const entry = entries[date] || { hours: 0, verlof: 0 };
                totalVerlof += entry.verlof;
                const calc = calculateOvertimeForDay(date, entry.hours);
                totalNormal += calc.normal;
                totalOt128 += calc.ot128;
                totalOt146 += calc.ot146;
                totalOt184 += calc.ot184;
            });

            const totalOvertime = totalOt128 + totalOt146 + totalOt184;
            const totalAll = totalNormal + totalVerlof + totalOvertime;

            document.getElementById('totalNormal').textContent = totalNormal.toFixed(1) + 'h';
            document.getElementById('totalVerlof').textContent = totalVerlof.toFixed(1) + 'h';
            document.getElementById('totalOvertime').textContent = totalOvertime.toFixed(1) + 'h';
            document.getElementById('totalAll').textContent = totalAll.toFixed(1) + 'h';

            const breakdown = document.getElementById('overtimeBreakdown');
            breakdown.innerHTML = `
                <div class="breakdown">
                    <div class="breakdown-label">Normaal:</div>
                    <div class="breakdown-value">${totalNormal.toFixed(1)}h</div>
                </div>
                <div class="breakdown">
                    <div class="breakdown-label">Verlof:</div>
                    <div class="breakdown-value">${totalVerlof.toFixed(1)}h</div>
                </div>
                ${totalOt128 > 0 ? `<div class="breakdown">
                    <div class="breakdown-label">Overuren 128%:</div>
                    <div class="breakdown-value">${totalOt128.toFixed(1)}h</div>
                </div>` : ''}
                ${totalOt146 > 0 ? `<div class="breakdown">
                    <div class="breakdown-label">Overuren 146%:</div>
                    <div class="breakdown-value">${totalOt146.toFixed(1)}h</div>
                </div>` : ''}
                ${totalOt184 > 0 ? `<div class="breakdown">
                    <div class="breakdown-label">Overuren 184%:</div>
                    <div class="breakdown-value">${totalOt184.toFixed(1)}h</div>
                </div>` : ''}
            `;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }

        loadEntries();
    </script>
</body>
</html>
