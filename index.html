<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e293b">
    <meta name="description" content="Uren Tracker CAO Kleinmetaal">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Uren">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%231e293b' width='180' height='180'/><text x='90' y='125' font-size='100' fill='%2360a5fa' text-anchor='middle' font-family='Arial'>🕐</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%231e293b' width='180' height='180'/><text x='90' y='125' font-size='100' fill='%2360a5fa' text-anchor='middle' font-family='Arial'>🕐</text></svg>">
    <title>🕐 Uren Tracker</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            margin-bottom: 1.5rem;
            padding-top: 0.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 640px) {
            .input-row {
                grid-template-columns: 1fr;
            }
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover:not(:disabled) {
            background: #2563eb;
        }

        button:disabled {
            background: #475569;
            opacity: 0.5;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .stat-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #60a5fa;
        }

        .cao-info {
            background: rgba(51, 65, 85, 0.3);
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 1rem;
            font-size: 0.75rem;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .cao-info p {
            margin-bottom: 0.5rem;
        }

        .entry-item {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .entry-project {
            font-weight: 600;
        }

        .entry-hours {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .delete-btn {
            background: #ef4444;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            width: auto;
            min-width: auto;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .week-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 0.5rem;
        }

        .week-stat {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 0.75rem;
            text-align: center;
            font-size: 0.75rem;
        }

        .week-stat-value {
            font-size: 1.25rem;
            font-weight: bold;
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕐 Uren Tracker</h1>
            <p>Werk bijhouden per opdracht</p>
        </div>

        <div class="card">
            <div class="input-row">
                <div class="input-group">
                    <label for="hours">Uren vandaag</label>
                    <input type="number" id="hours" placeholder="8" min="0" max="24" step="0.5">
                </div>
                <div class="input-group">
                    <label for="project">Opdracht</label>
                    <input type="text" id="project" placeholder="CNC werk" list="projects">
                    <datalist id="projects"></datalist>
                </div>
            </div>
            <button onclick="addEntry()">✅ Opslaan</button>
        </div>

        <div class="cao-info">
            📋 <strong>CAO KLEINMETAAL:</strong><br>
            🔹 Ma-Vrij: 1e+2e overuur = 128,44%<br>
            🔹 Ma-Vrij: 3e+ overuur = 146,56%<br>
            🔹 Zaterdag: 146,56% | 🔹 Zondag: 184,43%
        </div>

        <div class="card">
            <h2>Vandaag</h2>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Normaal</div>
                    <div class="stat-value" id="todayNormal">0h</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Overuren</div>
                    <div class="stat-value" id="todayOvertime">0h</div>
                </div>
            </div>
            <div id="todayList" style="margin-top: 1rem;"></div>
        </div>

        <div class="card">
            <h2>Deze week</h2>
            <div class="week-stats">
                <div class="week-stat">
                    <div class="stat-label">Normaal</div>
                    <div class="week-stat-value" id="weekNormal">0h</div>
                </div>
                <div class="week-stat">
                    <div class="stat-label">128%</div>
                    <div class="week-stat-value" id="week128">0h</div>
                </div>
                <div class="week-stat">
                    <div class="stat-label">146%</div>
                    <div class="week-stat-value" id="week146">0h</div>
                </div>
                <div class="week-stat">
                    <div class="stat-label">184%</div>
                    <div class="week-stat-value" id="week184">0h</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let entries = [];

        function loadEntries() {
            const stored = localStorage.getItem('uren_entries');
            entries = stored ? JSON.parse(stored) : [];
            updateProjects();
            render();
        }

        function saveEntries() {
            localStorage.setItem('uren_entries', JSON.stringify(entries));
        }

        function updateProjects() {
            const projects = [...new Set(entries.map(e => e.project))];
            const datalist = document.getElementById('projects');
            datalist.innerHTML = projects.map(p => `<option value="${p}">`).join('');
        }

        function calculateOvertimeForDay(date, hours) {
            const dayOfWeek = new Date(date + 'T00:00:00').getDay();
            
            if (dayOfWeek === 0) return { normal: 0, ot128: 0, ot146: 0, ot184: hours };
            if (dayOfWeek === 6) return { normal: 0, ot128: 0, ot146: hours, ot184: 0 };
            
            if (hours <= 8) return { normal: hours, ot128: 0, ot146: 0, ot184: 0 };
            if (hours <= 10) return { normal: 8, ot128: (hours - 8), ot146: 0, ot184: 0 };
            return { normal: 8, ot128: 2, ot146: (hours - 10), ot184: 0 };
        }

        function addEntry() {
            const hours = parseFloat(document.getElementById('hours').value);
            const project = document.getElementById('project').value.trim();

            if (!hours || !project) return;

            entries.unshift({
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                hours: hours,
                project: project
            });

            saveEntries();
            updateProjects();
            document.getElementById('hours').value = '';
            document.getElementById('project').value = '';
            render();
        }

        function deleteEntry(id) {
            entries = entries.filter(e => e.id !== id);
            saveEntries();
            render();
        }

        function render() {
            const today = new Date().toISOString().split('T')[0];
            const todayEntries = entries.filter(e => e.date === today);
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            const weekEntries = entries.filter(e => e.date > weekAgo);

            let todayNormal = 0, todayOt128 = 0, todayOt146 = 0, todayOt184 = 0;
            todayEntries.forEach(e => {
                const calc = calculateOvertimeForDay(e.date, e.hours);
                todayNormal += calc.normal;
                todayOt128 += calc.ot128;
                todayOt146 += calc.ot146;
                todayOt184 += calc.ot184;
            });

            document.getElementById('todayNormal').textContent = todayNormal.toFixed(1) + 'h';
            document.getElementById('todayOvertime').textContent = (todayOt128 + todayOt146 + todayOt184).toFixed(1) + 'h';

            const todayList = document.getElementById('todayList');
            todayList.innerHTML = todayEntries.map(e => {
                const calc = calculateOvertimeForDay(today, e.hours);
                let hours = '';
                if (calc.normal > 0) hours += `${calc.normal.toFixed(1)}h`;
                if (calc.ot128 > 0) hours += ` + ${calc.ot128.toFixed(1)}h@128%`;
                if (calc.ot146 > 0) hours += ` + ${calc.ot146.toFixed(1)}h@146%`;
                if (calc.ot184 > 0) hours += ` + ${calc.ot184.toFixed(1)}h@184%`;
                
                return `<div class="entry-item">
                    <div><div class="entry-project">${e.project}</div><div class="entry-hours">${hours}</div></div>
                    <button class="delete-btn" onclick="deleteEntry(${e.id})">🗑️</button>
                </div>`;
            }).join('');

            let weekNormal = 0, weekOt128 = 0, weekOt146 = 0, weekOt184 = 0;
            weekEntries.forEach(e => {
                const calc = calculateOvertimeForDay(e.date, e.hours);
                weekNormal += calc.normal;
                weekOt128 += calc.ot128;
                weekOt146 += calc.ot146;
                weekOt184 += calc.ot184;
            });

            document.getElementById('weekNormal').textContent = weekNormal.toFixed(1) + 'h';
            document.getElementById('week128').textContent = weekOt128.toFixed(1) + 'h';
            document.getElementById('week146').textContent = weekOt146.toFixed(1) + 'h';
            document.getElementById('week184').textContent = weekOt184.toFixed(1) + 'h';
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && (document.activeElement.id === 'hours' || document.activeElement.id === 'project')) {
                addEntry();
            }
        });

        // Service Worker registratie
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }

        loadEntries();
    </script>
</body>
</html>
